<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人名片</title>

    <link rel="stylesheet" href="./style.css">
    <!-- 引入字体图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <div class="container">
        <div class="card">
            <!-- 左侧：头像和个人信息 -->
            <div class="card-left">
                <div class="avatar">
                    <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="个人头像">
                    <div class="avatar-badge">
                        <i class="fas fa-check-circle"></i>
                    </div>
                </div>
                <h1>蕾哥</h1>
                <p class="title">前端开发工程师</p>
                <p class="company">@ 字节跳动 · 成都</p>
                <div class="contact-info">
                    <div class="contact-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>中国 · 成都</span>
                    </div>
                    <div class="contact-item">
                        <i class="fas fa-envelope"></i>
                        <span>leiguoguo@email.com</span>
                    </div>
                    <div class="contact-item">
                        <i class="fab fa-github"></i>
                        <span>github.com/leiguo</span>
                    </div>
                </div>
                <div class="social-links">
                    <a href="#" class="social-link"><i class="fab fa-github"></i></a>
                    <a href="#" class="social-link"><i class="fab fa-linkedin-in"></i></a>
                    <a href="#" class="social-link"><i class="fab fa-twitter"></i></a>
                    <a href="#" class="social-link"><i class="fab fa-weixin"></i></a>
                </div>
            </div>

            <!-- 右侧：简介和技能 -->
            <div class="card-right">
                <div class="about">
                    <h2><i class="fas fa-user-astronaut"></i> 关于我</h2>
                    <p>
                        3年+ 前端开发经验，热爱构建优雅、高性能的Web应用。
                        精通现代前端技术栈，注重用户体验和代码可维护性。
                        乐于分享技术知识，相信技术能创造更美好的数字世界。
                    </p>
                </div>

                <div class="skills">
                    <h2><i class="fas fa-code"></i> 专业技能</h2>

                    <div class="skill-item">
                        <div class="skill-header">
                            <span class="skill-name">HTML5/CSS3</span>
                            <span class="skill-percent">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress" data-percent="95"></div>
                        </div>
                    </div>

                    <div class="skill-item">
                        <div class="skill-header">
                            <span class="skill-name">JavaScript/ES6+</span>
                            <span class="skill-percent">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress" data-percent="90"></div>
                        </div>
                    </div>

                    <div class="skill-item">
                        <div class="skill-header">
                            <span class="skill-name">React/Vue</span>
                            <span class="skill-percent">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress" data-percent="85"></div>
                        </div>
                    </div>

                    <div class="skill-item">
                        <div class="skill-header">
                            <span class="skill-name">Node.js</span>
                            <span class="skill-percent">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress" data-percent="80"></div>
                        </div>
                    </div>

                    <div class="skill-item">
                        <div class="skill-header">
                            <span class="skill-name">UI/UX设计</span>
                            <span class="skill-percent">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress" data-percent="75"></div>
                        </div>
                    </div>

                    <div class="controls">
                        <button onclick="animateProgressBars()">▶ 播放动画</button>
                        <button onclick="resetProgressBars()">🔄 重置</button>
                    </div>
                </div>

                <div class="interests">
                    <h2><i class="fas fa-heart"></i> 兴趣爱好</h2>
                    <div class="interest-tags">
                        <span class="tag"><i class="fas fa-camera"></i> 数码</span>
                        <span class="tag"><i class="fas fa-book"></i> 阅读</span>
                        <span class="tag"><i class="fas fa-music"></i> 音乐</span>
                        <span class="tag"><i class="fas fa-sun"></i> 天文</span>
                        <span class="tag"><i class="fas fa-gamepad"></i> 游戏</span>
                    </div>
                </div>
            </div>
        </div>

        <script src="./script.js"></script>
</body>

</html>
