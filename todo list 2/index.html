<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项清单 | 优雅的任务管理工具</title>

    <link rel="stylesheet" href="style.css">
    <!-- 引入 Font Awesome 6 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <div class="container">
        <div class="todo-list">
            <h1>
                <i class="fas fa-check-circle"></i>
                待办事项清单
            </h1>

            <!-- 添加事项区域 -->
            <div class="add-todo">
                <input type="text" id="todoInput" placeholder="添加新的待办事项..." autocomplete="off">
                <button id="addBtn">
                    <i class="fas fa-plus"></i>
                    添加
                </button>
            </div>

            <!-- 筛选选项卡 -->
            <div class="filters">
                <button class="filter-btn active" data-filter="all">
                    <i class="fas fa-list"></i>
                    全部
                </button>
                <button class="filter-btn" data-filter="active">
                    <i class="fas fa-spinner"></i>
                    进行中
                </button>
                <button class="filter-btn" data-filter="completed">
                    <i class="fas fa-check"></i>
                    已完成
                </button>
            </div>

            <!-- 统计信息 -->
            <div class="stats">
                <span id="todoCount">0</span> 个待办事项
                <span id="completedCount">0</span> 个已完成
            </div>

            <!-- 批量操作栏 -->
            <div class="batch-actions" id="batchActions">
                <div class="batch-info">
                    <i class="fas fa-check-square"></i>
                    已选择 <span id="selectedCount">0</span> 项
                </div>
                <div class="batch-buttons">
                    <button id="batchCompleteBtn" class="batch-btn batch-complete">
                        <i class="fas fa-check-double"></i>
                        批量完成
                    </button>
                    <button id="batchUncompleteBtn" class="batch-btn batch-uncomplete">
                        <i class="fas fa-undo-alt"></i>
                        批量未完成
                    </button>
                    <button id="batchDeleteBtn" class="batch-btn batch-delete">
                        <i class="fas fa-trash-alt"></i>
                        批量删除
                    </button>
                    <button id="batchCancelBtn" class="batch-btn batch-cancel">
                        <i class="fas fa-times"></i>
                        取消选择
                    </button>
                </div>
            </div>

            <!-- 待办事项列表 -->
            <ul class="todo-list" id="todoList">
                <!-- 动态生成待办事项 -->
            </ul>

            <!-- 底部操作栏 -->
            <div class="todo-footer">
                <div class="footer-left">
                    <button id="selectAllBtn" class="footer-btn">
                        <i class="fas fa-check-double"></i>
                        全选
                    </button>
                    <button id="invertSelectBtn" class="footer-btn">
                        <i class="fas fa-exchange-alt"></i>
                        反选
                    </button>
                </div>
                <div class="footer-right">
                    <button id="clearCompletedBtn" class="clear-btn">
                        <i class="fas fa-trash-alt"></i>
                        清除已完成
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
